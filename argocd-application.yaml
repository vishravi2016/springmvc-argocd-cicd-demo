apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: springmvc-cicd-argo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/vishravi2016/springmvc-argocd-cicd-demo.git
    targetRevision: main
    path: k8s   # folder where your deployment.yaml & service.yaml exist

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true